<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">API Monitor</div>
      <nav class="nav flex-column">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/api/manage">API Management</a>
        <a class="nav-link" href="/monitor/logs">Monitoring Logs</a>
        <a class="nav-link" href="/alerts/">Alerts</a>
        <a class="nav-link active" href="/reports/">Reports</a>
      </nav>
    </aside>

    <main class="content">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0">Reports</h2>
        <div class="text-muted">Generated by scheduler</div>
      </div>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="panel">
            <div class="panel-title">Daily Report</div>
            <div class="text-muted mb-2">Download CSV with daily monitoring summary</div>
            <a class="btn btn-primary" href="/reports/daily" id="dailyLink" disabled>Download Daily CSV</a>
            <div class="small text-muted mt-2">Last generated: <span id="dailyMeta">N/A</span></div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="panel">
            <div class="panel-title">Monthly Report</div>
            <div class="text-muted mb-2">Download CSV with monthly monitoring summary</div>
            <a class="btn btn-primary" href="/reports/monthly" id="monthlyLink" disabled>Download Monthly CSV</a>
            <div class="small text-muted mt-2">Last generated: <span id="monthlyMeta">N/A</span></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
