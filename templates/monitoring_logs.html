<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monitoring Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">API Monitor</div>
      <nav class="nav flex-column">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/api/manage">API Management</a>
        <a class="nav-link active" href="/monitor/logs">Monitoring Logs</a>
        <a class="nav-link" href="/alerts/">Alerts</a>
        <a class="nav-link" href="/reports/">Reports</a>
      </nav>
    </aside>

    <main class="content">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0">Monitoring Logs</h2>
      </div>

      <div class="panel mb-3">
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Search (API name / reason)</label>
            <input class="form-control" id="searchInput" placeholder="e.g. Server error">
          </div>
          <div class="col-md-3">
            <label class="form-label">Status Code</label>
            <input class="form-control" id="statusCodeInput" placeholder="e.g. 500">
          </div>
          <div class="col-md-3">
            <label class="form-label">Region</label>
            <input class="form-control" id="regionInput" placeholder="e.g. us-east">
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100" id="btnApplyFilters">Apply</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="table-responsive">
          <table class="table table-hover mb-0" id="logsTable">
            <thead class="table-light">
              <tr>
                <th>Timestamp</th>
                <th>API Name</th>
                <th>Endpoint</th>
                <th>Status</th>
                <th>Response (ms)</th>
                <th>Failure Reason</th>
                <th>Region</th>
                <th>Severity</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">
          <button class="btn btn-outline-secondary" id="btnPrev">Prev</button>
          <div class="text-muted" id="pageInfo">Page 1</div>
          <button class="btn btn-outline-secondary" id="btnNext">Next</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/charts.js"></script>
</body>
</html>
