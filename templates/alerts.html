<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alerts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">API Monitor</div>
      <nav class="nav flex-column">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/api/manage">API Management</a>
        <a class="nav-link" href="/monitor/logs">Monitoring Logs</a>
        <a class="nav-link active" href="/alerts/">Alerts</a>
        <a class="nav-link" href="/reports/">Reports</a>
      </nav>
    </aside>

    <main class="content">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0">Alerts</h2>
        <button class="btn btn-outline-secondary" id="btnRefresh">Refresh</button>
      </div>

      <div class="panel">
        <div class="table-responsive">
          <table class="table table-hover mb-0" id="alertsTable">
            <thead class="table-light">
              <tr>
                <th>Alert Time</th>
                <th>Type</th>
                <th>Severity</th>
                <th>Message</th>
                <th>API Name</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="text-muted mt-3" id="alertsEmpty"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
